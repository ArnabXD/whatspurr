name: Lint

on:
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - "biome.json"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "biome.json"

jobs:
  biome:
    name: Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint
