name: Update whatsmeow

on:
  schedule:
    - cron: "0 9 * * *" # daily at 9 AM UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-whatsmeow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Get current whatsmeow version
        id: current
        run: |
          VERSION=$(grep 'go.mau.fi/whatsmeow ' go/go.mod | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          HASH=$(echo "$VERSION" | grep -oE '[a-f0-9]{12}$')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Update whatsmeow
        working-directory: go
        run: |
          go get go.mau.fi/whatsmeow@latest
          go mod tidy

      - name: Check for changes
        id: updated
        run: |
          VERSION=$(grep 'go.mau.fi/whatsmeow ' go/go.mod | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          HASH=$(echo "$VERSION" | grep -oE '[a-f0-9]{12}$')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          if git diff --quiet go/go.mod; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch whatsmeow changelog
        if: steps.updated.outputs.changed == 'true'
        env:
          OLD_HASH: ${{ steps.current.outputs.hash }}
          NEW_HASH: ${{ steps.updated.outputs.hash }}
        run: |
          git clone --filter=blob:none https://github.com/tulir/whatsmeow.git /tmp/whatsmeow 2>/dev/null || \
            git clone --filter=blob:none https://mau.dev/tulir/whatsmeow.git /tmp/whatsmeow 2>/dev/null || true

          if [ -d /tmp/whatsmeow/.git ]; then
            git -C /tmp/whatsmeow log --oneline "$OLD_HASH..$NEW_HASH" > /tmp/whatsmeow-changelog.txt 2>/dev/null || \
              echo "_Could not resolve commits between $OLD_HASH and $NEW_HASH_" > /tmp/whatsmeow-changelog.txt
          else
            echo "_Could not clone whatsmeow repository_" > /tmp/whatsmeow-changelog.txt
          fi

      - name: Bump patch version
        if: steps.updated.outputs.changed == 'true'
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEXT" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Bumped $CURRENT -> $NEXT"

      - name: Prepare PR body
        if: steps.updated.outputs.changed == 'true'
        env:
          OLD_VERSION: ${{ steps.current.outputs.version }}
          NEW_VERSION: ${{ steps.updated.outputs.version }}
        run: |
          {
            echo "## whatsmeow dependency update"
            echo ""
            echo "**Previous:** \`$OLD_VERSION\`"
            echo "**Updated:** \`$NEW_VERSION\`"
            echo ""
            echo "### Changelog (whatsmeow)"
            echo ""
            cat /tmp/whatsmeow-changelog.txt
            echo ""
            echo "---"
            echo "*Auto-generated by the update-whatsmeow workflow.*"
          } > /tmp/pr-body.md

      - name: Create pull request
        if: steps.updated.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): update whatsmeow to ${{ steps.updated.outputs.version }}"
          title: "chore(deps): update whatsmeow to ${{ steps.updated.outputs.version }}"
          body-path: /tmp/pr-body.md
          branch: deps/whatsmeow-update
          labels: dependencies
